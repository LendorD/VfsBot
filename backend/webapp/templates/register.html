{% extends "base.html" %}
{% block title %}Регистрация · Visa Booking{% endblock %}
{% block content %}
<div class="mx-auto mt-10 max-w-md">
  <div class="mb-6 text-center">
    <div class="mx-auto mb-3 grid h-14 w-14 place-items-center rounded-2xl bg-gradient-to-br from-indigo-600 to-sky-500 text-2xl text-white shadow-lg">✈</div>
    <h1 class="text-2xl font-bold text-slate-900">Создать аккаунт</h1>
    <p class="mt-1 text-sm text-slate-500">Пара секунд — и можно создавать заявки</p>
  </div>

  <div class="rounded-2xl border border-slate-200 bg-white p-7 shadow-sm">
    {% if error %}
    <div class="mb-4 rounded-lg border border-red-200 bg-red-50 px-4 py-2.5 text-sm text-red-700">{{ error }}</div>
    {% endif %}
    <form method="post" action="/register" class="space-y-4">
      <div>
        <label class="mb-1 block text-sm font-medium text-slate-700">Email</label>
        <input name="email" type="email" required
               class="w-full rounded-lg border border-slate-300 px-3.5 py-2.5 text-sm outline-none transition focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100"
               placeholder="you@example.com" />
      </div>
      <div>
        <label class="mb-1 block text-sm font-medium text-slate-700">Пароль</label>
        <input name="password" type="password" required minlength="6"
               class="w-full rounded-lg border border-slate-300 px-3.5 py-2.5 text-sm outline-none transition focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100"
               placeholder="минимум 6 символов" />
      </div>
      <button type="submit"
              class="w-full rounded-lg bg-gradient-to-r from-indigo-600 to-sky-500 px-4 py-2.5 text-sm font-semibold text-white shadow-sm transition hover:opacity-95">
        Зарегистрироваться
      </button>
    </form>
  </div>

  <p class="mt-5 text-center text-sm text-slate-500">
    Уже есть аккаунт?
    <a href="/login" class="font-medium text-indigo-600 hover:underline">Войти</a>
  </p>
</div>
{% endblock %}
